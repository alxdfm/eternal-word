name: Release

# Deploy dispara ao publicar uma release no GitHub. A tag da release é o
# que vai para produção — nunca o topo da branch.
#
# O programa Anchor NÃO é deployado aqui, por decisão registrada em
# docs/decisions/2026-07-19_pipeline-de-deploy.md: deploy de programa é
# irreversível e permanece manual, com runbook próprio.
on:
  release:
    types: [published]

concurrency:
  group: release
  cancel-in-progress: false

# Default restritivo; cada job amplia só o que precisa (deploy-api usa OIDC).
permissions:
  contents: read

jobs:
  verify:
    name: Verificação pré-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Nunca deployar sem a suíte verde na mesma tag: a release pode ter
      # sido criada de um commit que não passou pelo CI da branch.
      - name: Typecheck, lint & test
        run: |
          pnpm typecheck
          pnpm lint
          pnpm test

      # O que vai a produção precisa carregar o mesmo texto canônico que
      # está registrado on-chain.
      - name: Verificar CanonicalText e Merkle root
        run: |
          pnpm catalog:verify
          pnpm catalog:merkle --check

  deploy-web:
    name: Deploy web (Vercel)
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}

      # apps/web já existe como placeholder do workspace; o que marca que ele
      # é deployável é ter um script de build (chega na S04).
      - name: Detect app
        id: app
        run: |
          if grep -q '"build"' apps/web/package.json 2>/dev/null; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::apps/web ainda não é deployável (S04) — deploy pulado."
          fi

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        if: steps.app.outputs.ready == 'true'

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.app.outputs.ready == 'true'
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # O build da web depende dos pacotes do workspace (`workspace:*`),
      # então precisa das dependências instaladas antes do Vercel CLI.
      - name: Install
        if: steps.app.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile

      # A CLI do Vercel lê VERCEL_TOKEN do ambiente — passar `--token` na linha
      # de comando exporia o segredo no argv do processo no runner.
      #
      # Versão fixada de propósito: `vercel@latest` daria a este step, que
      # carrega o token de deploy, qualquer release publicada da CLI.
      - name: Deploy
        if: steps.app.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          pnpm dlx vercel@56.3.2 pull --yes --environment=production
          pnpm dlx vercel@56.3.2 build --prod
          pnpm dlx vercel@56.3.2 deploy --prebuilt --prod

  deploy-api:
    name: Deploy API e indexer (AWS)
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # OIDC — sem chave de acesso de longa duração no repo
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}

      # Idem: o sinal de que a API é deployável é existir o script de deploy
      # (chega na S03, junto da ferramenta escolhida).
      - name: Detect app
        id: app
        run: |
          if grep -q '"deploy:production"' apps/api/package.json 2>/dev/null; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::apps/api ainda não é deployável (S03) — deploy pulado."
          fi

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        if: steps.app.outputs.ready == 'true'

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.app.outputs.ready == 'true'
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Credenciais AWS (OIDC)
        if: steps.app.outputs.ready == 'true'
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Install
        if: steps.app.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile

      # Ferramenta de deploy definida na S03 (provável SST). O comando
      # abaixo é o placeholder documentado — ajustar ao fechar a escolha.
      - name: Deploy
        if: steps.app.outputs.ready == 'true'
        run: pnpm --filter @eternal-word/api deploy:production

  summary:
    name: Resumo
    needs: [deploy-web, deploy-api]
    if: always()
    runs-on: ubuntu-latest
    steps:
      # O nome da tag chega por `env`, nunca interpolado direto no shell:
      # `${{ }}` dentro de `run:` é substituído como texto antes da execução,
      # então uma tag contendo `$(...)` ou crase viraria comando no runner.
      # Hoje só quem tem write access publica release, mas basta um bot de
      # release entrar no fluxo para isso deixar de ser verdade.
      - name: Registrar resultado
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
          WEB_RESULT: ${{ needs.deploy-web.result }}
          API_RESULT: ${{ needs.deploy-api.result }}
        run: |
          {
            echo "### Release \`${TAG_NAME}\`"
            echo ""
            echo "| Alvo | Resultado |"
            echo "|------|-----------|"
            echo "| Web (Vercel) | ${WEB_RESULT} |"
            echo "| API + indexer (AWS) | ${API_RESULT} |"
            echo ""
            echo "O programa Solana **não** é deployado por esta pipeline."
            echo "Ver \`docs/decisions/2026-07-19_pipeline-de-deploy.md\`."
          } >> "$GITHUB_STEP_SUMMARY"

# Postgres local para o desenvolvimento da S03 (indexer). A infra gerenciada
# (Supabase) só entra na IX-05; até lá o mesmo schema/seed roda contra este.
# Major 15 para alinhar ao Supabase (que oferece 15 e 17, pulou o 16) — ver ADR
# docs/decisions/2026-07-22_tooling-de-banco-e-postgres-local.md.
services:
  db:
    image: postgres:15
    container_name: eternal-word-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eternal_word}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eternal_word}
      POSTGRES_DB: ${POSTGRES_DB:-eternal_word}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - eternal-word-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-eternal_word} -d ${POSTGRES_DB:-eternal_word}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  eternal-word-db-data:
